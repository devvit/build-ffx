name: Build Firefox on Windows

on:
  push:
  schedule:
    - cron: '0 0 1 * *'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: "checkout repo"
        uses: actions/checkout@v4

      - name: Install MozillaBuild
        run: |
          echo "version=$(bash ${{ github.workspace }}/version.sh)" >> $env:GITHUB_ENV
          choco install mozillabuild -y --no-progress

      - name: Bootstrap Mozilla Source
        working-directory: C:\
        shell: bash
        run: |
          mkdir mozilla-source
          cd mozilla-source
          git clone --depth 1 --branch $version https://github.com/mozilla-firefox/firefox mozilla-unified

      - name: Initialize `mozconfig`
        working-directory: C:\mozilla-source\mozilla-unified
        shell: bash
        run: |
          bash $GITHUB_WORKSPACE/patch.sh

      - name: Build and Package
        working-directory: C:\mozilla-source\mozilla-unified
        # 移除原有的 shell 声明，改用默认的 PowerShell/CMD 或明确的 bash
        # 我们通过 start-shell.bat 后面直接跟 -c 来单行执行命令
        run: |
          # 1. 执行 Bootstrap（通过 start-shell.bat 的控制台参数传进去）
          & C:\mozilla-build\start-shell.bat -here -c "./mach --no-interactive bootstrap --application-choice=browser"
          
          # 2. 执行 Build
          & C:\mozilla-build\start-shell.bat -here -c "./mach build"
          
          # 3. 执行 Package
          & C:\mozilla-build\start-shell.bat -here -c "./mach package"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-firefox-${{ env.version }}-amd64
          path: "C:/mozilla-source/mozilla-unified/obj-x86_64-pc-windows-msvc/dist/install/sea"
          retention-days: 30
